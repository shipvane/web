<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Shipvane">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CDE8FA"/><stop offset="1" stop-color="#A6CFF0"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#327ABE"/><stop offset="1" stop-color="#0F2F5C"/>
    </linearGradient>
    <linearGradient id="port" x1="0.1" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#4A90CE"/><stop offset="1" stop-color="#19406F"/>
    </linearGradient>
    <linearGradient id="front" x1="0.9" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#23538E"/><stop offset="1" stop-color="#0C2549"/>
    </linearGradient>
    <radialGradient id="ring" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.86" stop-color="#0E2746"/><stop offset="1" stop-color="#081A33"/>
    </radialGradient>
    <clipPath id="scene"><circle cx="128" cy="128" r="106"/></clipPath>
  </defs>

  <circle cx="128" cy="128" r="118" fill="url(#ring)"/>
  <circle cx="128" cy="128" r="106" fill="#0a1f3b"/>

  <g clip-path="url(#scene)">
    <rect x="22" y="22" width="212" height="212" fill="url(#sky)"/>
    <path d="M22,170 Q128,162 234,170 L234,234 L22,234 Z" fill="url(#sea)"/>

    <!-- north needle -->
    <polygon points="128,24 136,52 128,45 120,52" fill="#34D399"/>
    <circle cx="128" cy="52" r="2.4" fill="#0C2746"/>

    <!-- forecastle deck cap (seen from below) -->
    <path d="M130,60 Q92,62 60,80 Q128,72 196,80 Q168,62 130,60 Z" fill="#5A9AD8"/>
    <rect x="118" y="52" width="24" height="11" rx="2.5" fill="#CFE2F7"/>

    <!-- bulbous bow (under the waterline, nearest point) -->
    <ellipse cx="120" cy="204" rx="15" ry="9" fill="#0C2549"/>

    <!-- port (lit) hull face — CURVED flare -->
    <path d="M130,60 Q74,74 50,104 Q54,150 80,176 Q100,194 120,202 L130,60 Z" fill="url(#port)"/>
    <!-- starboard / bow-front face (shadow) — curved flare -->
    <path d="M130,60 Q188,74 206,104 Q200,150 174,176 Q150,194 120,202 L130,60 Z" fill="url(#front)"/>
    <!-- cutwater stem -->
    <path d="M130,60 L120,202" fill="none" stroke="#A8CFF2" stroke-width="2.6" opacity="0.85"/>
    <!-- hull sheer accents (plating) -->
    <path d="M58,118 Q120,108 198,118" fill="none" stroke="#0C2549" stroke-width="1.6" opacity="0.35"/>
    <path d="M72,150 Q120,142 168,150" fill="none" stroke="#0C2549" stroke-width="1.6" opacity="0.35"/>
    <!-- boot stripe at waterline -->
    <path d="M70,168 Q120,196 170,168" fill="none" stroke="#34D399" stroke-width="2" opacity="0.7"/>
    <!-- anchor hawse + bow markings -->
    <circle cx="104" cy="150" r="2.6" fill="#0C2549" opacity="0.55"/>
    <circle cx="150" cy="150" r="2.6" fill="#0C2549" opacity="0.55"/>

    <!-- bow wave bursting at the cutwater -->
    <g fill="#CFE9FB">
      <path d="M120,202 C94,206 66,206 42,196 C70,224 106,224 130,210 Z"/>
      <path d="M120,202 C146,206 174,206 198,196 C170,224 136,224 114,210 Z"/>
    </g>
    <g fill="none" stroke="#CFE9FB" stroke-width="2.6" stroke-linecap="round" opacity="0.8">
      <path d="M50,210 q34,12 70,8 t70,-8"/>
      <path d="M38,228 q44,10 90,0 t90,0"/>
    </g>
  </g>

  <g stroke="#EAF4FF" stroke-linecap="round">
    <g stroke-width="3.4">
      <line x1="128" y1="11" x2="128" y2="22"/><line x1="245" y1="128" x2="234" y2="128"/>
      <line x1="128" y1="245" x2="128" y2="234"/><line x1="11" y1="128" x2="22" y2="128"/>
    </g>
    <g stroke-width="2.2" opacity="0.65">
      <line x1="210" y1="46" x2="203" y2="53"/><line x1="210" y1="210" x2="203" y2="203"/>
      <line x1="46" y1="210" x2="53" y2="203"/><line x1="46" y1="46" x2="53" y2="53"/>
    </g>
  </g>
</svg>
